<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Construct Event Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2d;
      --line:#23304b;
      --text:#e8eefc;
      --muted:#9ab0d6;
      --primary:#3b82f6;
      --primary2:#2563eb;
      --ok:#22c55e;
    }
    * { box-sizing: border-box; }
    body {
      font-family: Inter, Arial, sans-serif;
      margin: 0;
      background: radial-gradient(1200px 500px at 20% -10%, #14233f 0%, var(--bg) 45%) fixed;
      color: var(--text);
    }
    .wrap { max-width: 560px; margin: 0 auto; padding: 16px 14px 20px; }
    .hero {
      background: linear-gradient(180deg, #1a2a4d 0%, #111a2d 100%);
      border: 1px solid #2a3a5e;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    h1 { font-size: 22px; margin: 0 0 8px; letter-spacing: .2px; }
    .hint { color: var(--muted); font-size: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 13px;
      color: #c8d8fa;
      font-weight: 600;
    }
    input[type="number"], input[type="text"], select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #314567;
      background: #0d1528;
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus { border-color: #4f79c7; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 12px 0;
      padding: 10px 12px;
      background: #0d1528;
      border: 1px solid #243453;
      border-radius: 12px;
    }
    .save-btn {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary2) 100%);
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(37,99,235,.35);
    }
    .ok {
      margin-top: 10px;
      color: #d1fae5;
      background: rgba(34,197,94,.16);
      border: 1px solid rgba(34,197,94,.35);
      border-radius: 10px;
      padding: 10px 12px;
      display: none;
    }
    .roles-title { margin: 4px 0 8px; font-size: 14px; color: #d9e6ff; font-weight: 700; }
    .role-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
      padding: 10px;
      background: #0d1528;
      border: 1px solid #243453;
      border-radius: 12px;
    }
    .role-name { font-size: 14px; color: #e8eefc; }
    .role-item input[type="number"] { width: 84px; }
    .hidden { display: none !important; }
    .toolbar { display:flex; gap:8px; margin-top:10px; }
    .ghost-btn {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid #365081;
      background: #13203b;
      color: #dbe9ff;
      font-weight: 700;
      cursor: pointer;
    }
    .tabbar { display:flex; gap:8px; margin: 10px 0 8px; }
    .tab {
      flex:1;
      text-align:center;
      border:1px solid #2f4470;
      background:#0f1a31;
      color:#cfe0ff;
      border-radius:10px;
      padding:8px 6px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      user-select:none;
    }
    .tab.active { border-color:#4f79c7; background:#16274b; color:#fff; }
    .subsection { margin-top: 8px; }
    .pill {
      display:inline-block;
      font-size:11px;
      color:#9db6e6;
      border:1px solid #2b3f66;
      border-radius:999px;
      padding:3px 8px;
      margin-bottom:8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero" id="heroCard">
      <h1>🎛️ Construct Event</h1>
      <div class="hint" id="heroHint">Сучасна панель налаштувань групи.</div>
    </div>

    <div class="card" id="stepGroupCard">
      <label for="group_select">Група</label>
      <select id="group_select"></select>

      <label for="group_id">Або ID групи вручну</label>
      <input id="group_id" type="text" placeholder="-1001234567890" />
      <div class="hint">Список груп підтягується автоматично з прав /construct_event.</div>
      <div class="toolbar">
        <button class="save-btn" id="continueBtn">Продовжити</button>
      </div>
    </div>

    <div class="card hidden" id="stepSettingsCard">
      <div class="pill" id="selectedGroupPill">Група: -</div>
      <div class="tabbar">
        <div class="tab active" data-tab="roles">Ролі</div>
        <div class="tab" data-tab="group">Група</div>
      </div>

      <div class="subsection" id="tab_roles">
        <div class="roles-title">Ролі (увімкнення + мін. гравців)</div>
        <div id="roles_container"></div>
      </div>

      <div class="subsection hidden" id="tab_group">
        <label for="registration_time">Час реєстрації (сек.)</label>
        <input id="registration_time" type="number" min="15" max="600" value="90" />

        <div class="row">
          <span>Бафи увімкнені</span>
          <input id="buffs_enabled" type="checkbox" checked />
        </div>
        <div class="row">
          <span>Тільки унікальні бафи</span>
          <input id="unique_buffs_only" type="checkbox" />
        </div>
      </div>
    </div>

    <div class="toolbar hidden" id="settingsActions">
      <button class="ghost-btn" id="backBtn">Назад</button>
      <button class="save-btn" id="saveBtn">Зберегти</button>
    </div>
    <div class="ok" id="okMsg">✅ Налаштування надіслано в бота.</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const $ = (id) => document.getElementById(id);
    const q = new URLSearchParams(window.location.search);

    function parseGroups() {
      const raw = q.get("groups");
      if (!raw) return [];
      try {
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return [];
        return arr
          .map((g) => ({ id: String(g.id || "").trim(), title: String(g.title || g.id || "").trim() }))
          .filter((g) => g.id);
      } catch (e) {
        return [];
      }
    }

    function parseRolePresets() {
      const raw = q.get("role_presets");
      if (!raw) return {};
      try {
        const obj = JSON.parse(raw);
        return obj && typeof obj === "object" ? obj : {};
      } catch (e) {
        return {};
      }
    }
    function parseGroupPresets() {
      const raw = q.get("group_presets");
      if (!raw) return {};
      try {
        const obj = JSON.parse(raw);
        return obj && typeof obj === "object" ? obj : {};
      } catch (e) {
        return {};
      }
    }

    const groups = parseGroups();
    const rolePresets = parseRolePresets();
    const groupPresets = parseGroupPresets();
    const fallbackDefaultRoles = [
      "Аль Капоне", "Мафія", "Лікар", "Мирний житель", "Комісар Каттані",
      "Сержант", "Коханка", "Маніяк", "Тілоохоронець", "Волоцюга",
      "Камікадзе", "Щасливчик", "Самогубець", "Мед. сестра", "Журналіст",
      "Адвокат", "Клоун", "Брехун", "Диявол", "Шериф"
    ].map((name) => ({ name, enabled: true, min_players: 1 }));
    const sel = $("group_select");
    const defaultGid = (q.get("default_gid") || "").trim();
    if (groups.length > 0) {
      groups.forEach((g) => {
        const opt = document.createElement("option");
        opt.value = g.id;
        opt.textContent = `${g.title} (${g.id})`;
        sel.appendChild(opt);
      });
      if (defaultGid) sel.value = defaultGid;
      $("group_id").value = sel.value || "";
      sel.addEventListener("change", () => {
        $("group_id").value = sel.value || "";
        renderRolesForGroup($("group_id").value.trim());
      });
    } else {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Немає автосписку груп";
      sel.appendChild(opt);
      sel.disabled = true;
    }

    function roleRow(role) {
      const wrap = document.createElement("div");
      wrap.className = "role-item";
      wrap.dataset.roleName = String(role.name || "");
      wrap.innerHTML = `
        <div class="role-name">${String(role.name || "")}</div>
        <label style="display:flex;align-items:center;gap:6px;margin:0;font-size:12px;color:#9ab0d6;">
          <input type="checkbox" class="role-enabled" ${role.enabled ? "checked" : ""}/>
          on
        </label>
        <input type="number" class="role-min" min="1" max="30" value="${Number(role.min_players || 1)}" />
      `;
      return wrap;
    }

    function renderRolesForGroup(groupId) {
      const box = $("roles_container");
      box.innerHTML = "";
      const key = String(groupId || "");
      let list = Array.isArray(rolePresets[key]) ? rolePresets[key] : [];
      if (!list.length) {
        // fallback: базовий набір ролей, щоб конструктор працював навіть без пресету з бекенду
        list = fallbackDefaultRoles;
      }
      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "hint";
        empty.textContent = "Для цієї групи пресет ролей ще не завантажився. Можна зберігати базові налаштування.";
        box.appendChild(empty);
        return;
      }
      list.forEach((r) => box.appendChild(roleRow(r)));
    }

    function applyGroupSettings(groupId) {
      const key = String(groupId || "");
      const p = groupPresets[key] || {};
      const reg = Number(p.registration_time);
      $("registration_time").value = Number.isFinite(reg) && reg > 0 ? reg : 90;
      $("buffs_enabled").checked = p.buffs_enabled !== false;
      $("unique_buffs_only").checked = !!p.unique_buffs_only;
    }

    function setStep(step) {
      const isSettings = step === "settings";
      $("stepGroupCard").classList.toggle("hidden", isSettings);
      $("stepSettingsCard").classList.toggle("hidden", !isSettings);
      $("settingsActions").classList.toggle("hidden", !isSettings);
      $("heroHint").textContent = isSettings
        ? "Налаштуй ролі та параметри групи."
        : "Спочатку обери групу.";
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab").forEach((t) => {
        t.classList.toggle("active", t.dataset.tab === tabName);
      });
      $("tab_roles").classList.toggle("hidden", tabName !== "roles");
      $("tab_group").classList.toggle("hidden", tabName !== "group");
    }

    document.querySelectorAll(".tab").forEach((el) => {
      el.addEventListener("click", () => switchTab(el.dataset.tab));
    });

    $("continueBtn").addEventListener("click", () => {
      const gid = $("group_id").value.trim() || (sel.value || "").trim();
      if (!gid) {
        alert("Обери або введи ID групи.");
        return;
      }
      $("group_id").value = gid;
      $("selectedGroupPill").textContent = `Група: ${gid}`;
      renderRolesForGroup(gid);
      applyGroupSettings(gid);
      setStep("settings");
      switchTab("roles");
    });

    $("backBtn").addEventListener("click", () => setStep("group"));
    setStep("group");

    $("saveBtn").addEventListener("click", () => {
      const finalGroupId = $("group_id").value.trim() || (sel.value || "").trim();
      const roles_updates = Array.from(document.querySelectorAll(".role-item")).map((el) => {
        const name = (el.dataset.roleName || "").trim();
        const enabled = !!el.querySelector(".role-enabled")?.checked;
        const min_players = Number(el.querySelector(".role-min")?.value || 1);
        return { name, enabled, min_players };
      }).filter((x) => x.name);
      const payload = {
        action: "construct_event_save",
        group_id: finalGroupId,
        registration_time: Number($("registration_time").value || 90),
        buffs_enabled: !!$("buffs_enabled").checked,
        unique_buffs_only: !!$("unique_buffs_only").checked,
        roles_updates
      };

      if (!payload.group_id) {
        alert("Вкажи ID групи.");
        return;
      }

      if (tg && typeof tg.sendData === "function") {
        $("saveBtn").disabled = true;
        $("saveBtn").textContent = "Надсилаю...";
        tg.sendData(JSON.stringify(payload));
        // Локально оновлюємо пресет, щоб UI не "стрибає" назад на старе значення.
        const gk = String(finalGroupId);
        groupPresets[gk] = {
          registration_time: Number(payload.registration_time || 90),
          buffs_enabled: !!payload.buffs_enabled,
          unique_buffs_only: !!payload.unique_buffs_only
        };
        $("okMsg").style.display = "block";
        setTimeout(() => tg.close(), 1200);
      } else {
        alert("Запусти Mini App з Telegram, щоб зберегти.");
      }
    });
  </script>
</body>
</html>
